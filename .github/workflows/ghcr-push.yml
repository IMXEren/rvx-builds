name: Push to GHCR

on:
  workflow_call:
    inputs:
      IMAGE_TAG:
        required: true
        type: string
      FILE:
        required: false
        type: string
      EXTRA_FONTS:
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch extra fonts
        if: inputs.EXTRA_FONTS
        env:
          GH_TOKEN: ${{ secrets.SECRET_GITHUB_PAT }}
        run: |
          gh api repos/IMXEren/extra-fonts/contents/fonts.zip \
            --jq '.content' | base64 -d > fonts.zip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image name
        id: image
        run: |
          IMAGE="${{ inputs.IMAGE_TAG }}"
          echo "NAME=${IMAGE%:*}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest (${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: ${{ matrix.platform }}
          file: ${{ inputs.FILE }}
          outputs: type=image,name=${{ steps.image.outputs.NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  merge-manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Extract image name
        id: image
        run: |
          IMAGE="${{ inputs.IMAGE_TAG }}"
          echo "NAME=${IMAGE%:*}" >> "$GITHUB_OUTPUT"

      - name: Create manifest
        run: |
          docker buildx imagetools create \
          -t "${{ inputs.IMAGE_TAG }}" \
          $(for digest in /tmp/digests/*; do
            echo "${{ steps.image.outputs.NAME }}@sha256:$(basename "$digest")"
          done)
