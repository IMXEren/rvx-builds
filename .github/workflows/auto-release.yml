name: Auto Build & Release
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  HAVE_TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID != '' }}
on:
  workflow_dispatch:
    inputs:
      TELEGRAM_NO_ROOT_UPLOAD:
        description: "Upload Non Rooted APKs to Telegram"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 * * * *"
jobs:
  release-check:
    permissions: write-all
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Update Env for custom build
        run: |
          echo "${{ secrets.ENVS }}" >> .env

      - name: Setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install uv with all available options
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.x"
          python-version: "3"
          activate-environment: "true"

      - name: Install Requirements
        run: |
          uv pip install -r requirements.txt

      - name: Should build?
        id: should_build
        shell: bash
        env:
          GITHUB_PAT: ${{ secrets.SECRET_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          GITLAB_PAT: ${{ secrets.SECRET_GITLAB_PAT }}
        run: |
          output=$(python check_resource_updates.py)
          should_build="$(grep -m1 '^PATCH_APPS=' <<< "$output" | cut -d= -f2- | tr -d '\r' || printf '')"
          echo "SHOULD_BUILD=$should_build" >> $GITHUB_OUTPUT

      - name: Upload patch updates changelog
        uses: actions/upload-artifact@main
        if: ${{ steps.should_build.outputs.SHOULD_BUILD != '' }}
        with:
          name: Patch-Updates
          path: |
            patch-updates.md
          if-no-files-found: error
          retention-days: 0

    outputs:
      SHOULD_BUILD: ${{ steps.should_build.outputs.SHOULD_BUILD }}

  build-release:
    permissions: write-all
    needs: release-check
    uses: ./.github/workflows/build-apk.yml
    if: ${{ needs.release-check.outputs.SHOULD_BUILD != '' }}
    secrets: inherit
    concurrency:
      group: Auto-Release-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    with:
      TELEGRAM_NO_ROOT_UPLOAD: ${{ inputs.TELEGRAM_NO_ROOT_UPLOAD || false }}
      PREFERRED_PATCH_APPS: ${{ needs.release-check.outputs.SHOULD_BUILD }}
