name: Build & Upload
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      ENVS:
        required: false
      DOCKER_PY_REVANCED_SECRETS:
        required: false
      SECRET_GITHUB_PAT:
        required: false
      SECRET_GITLAB_PAT:
        required: false
      SECRET_REDDIT_CLIENT_ID:
        required: false
      SECRET_OBTAINIUM_GH_PAT:
        required: false
    inputs:
      CI_TEST:
        required: false
        type: boolean
        default: false
      COMMIT_CHANGELOG:
        type: boolean
        required: false
        default: true
      DEBUG_ENABLED:
        type: boolean
        description: "Run the build with tmate debugging enabled."
        required: false
        default: false
      PREFERRED_PATCH_APPS:
        description: "Apps to be patched. Overrides any env set"
        required: false
        type: string

jobs:
  build-apk:
    permissions: write-all
    name: APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out Git repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Inject custom secrets into .env file
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          ALL_VARS: ${{ toJson(vars) }}
        run: |
          echo "${{ secrets.ENVS }}" >> .env
          echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
          echo "${{ secrets.DOCKER_PY_REVANCED_SECRETS }}" >> .env
          echo "$ALL_SECRETS" | jq -r 'to_entries | .[] | select(.key | startswith("SECRET_")) | "\(.key | sub("^SECRET_"; ""))=\(.value)"' >> .env
          echo "$ALL_VARS" | jq -r 'to_entries | .[] | select(.key | startswith("VAR_")) | "\(.key | sub("^VAR_"; ""))=\(.value)"' >> .env
          echo "Injected custom secrets into .env file"

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install Requirements
        if: ${{ inputs.PREFERRED_PATCH_APPS }}
        env:
          PREFERRED_PATCH_APPS: ${{ inputs.PREFERRED_PATCH_APPS }}
        run: |
          python -m pip install uv
          uv pip install --system -r requirements.txt

      - name: Override Patch apps
        if: ${{ inputs.PREFERRED_PATCH_APPS }}
        env:
          PREFERRED_PATCH_APPS: ${{ inputs.PREFERRED_PATCH_APPS }}
        run: |
          python -m scripts.prefered_apps

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3.24
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.DEBUG_ENABLED }}
        with:
          detached: true

      - name: Build Revanced APKs
        if: ${{ true && !inputs.DEBUG_ENABLED }}
        run: |
          if [[ "${{ inputs.CI_TEST }}" =~ ^(true|True|1)$ ]]; then
              echo "In CI Testing. Using local compose file."
              docker compose -f docker-compose-local.yml up --build revanced
          else
              echo "Using Prod compose file."
              docker compose up --build revanced
          fi

      - name: Verify at least one APK was patched
        if: ${{ true && !inputs.DEBUG_ENABLED }}
        run: |
          # Count patched APKs (excluding Microg which is a dependency, not a patched app)
          patched_count=$(find apks -maxdepth 1 -name "*-output.apk" ! -name "Revanced-Microg-output.apk" -type f 2>/dev/null | wc -l)
          echo "Found $patched_count patched APK(s)"

          if [ "$patched_count" -eq 0 ]; then
            echo "::error::No APKs were successfully patched. Build failed."
            exit 1
          fi

          echo "✅ Successfully patched $patched_count APK(s):"
          find apks -maxdepth 1 -name "*-output.apk" ! -name "Revanced-Microg-output.apk" -type f

      - name: Ensure changelog files exist
        if: ${{ true && !inputs.DEBUG_ENABLED }}
        run: |
          # Create empty changelog files if they don't exist (fallback for failed builds)
          if [ ! -f changelog.md ]; then
            echo "| Resource Name | Version | Changelog | Published On | Build By|" > changelog.md
            echo "|---------------|---------|-----------|--------------|---------|" >> changelog.md
          fi
          if [ ! -f changelog.json ]; then
            echo "{}" > changelog.json
          fi
          if [ ! -f updates.json ]; then
            echo "{}" > updates.json
          fi

      - name: Upload Build APKS
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ true && !inputs.DEBUG_ENABLED }}
        with:
          name: Built-APKs
          path: |
            changelog.md
            changelog.json
            updates.json
            apks/*-output.apk
            apks/VancedMicroG.apk
            app_changelogs/**
          if-no-files-found: error

      - name: Create Per-App Releases in Private Repo
        if: ${{ inputs.COMMIT_CHANGELOG && !inputs.CI_TEST }}
        env:
          GH_TOKEN: ${{ secrets.SECRET_OBTAINIUM_GH_PAT }}
        run: |
          TARGET_REPO="$(grep -m1 '^OBTAINIUM_GH_PRIVATE_EXPORT=' .env 2>/dev/null | cut -d= -f2- | sed "s/^['\"]//; s/['\"]$//")"

          if [ -z "$TARGET_REPO" ]; then
            echo "OBTAINIUM_GH_PRIVATE_EXPORT not set. Skipping per-app releases."
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning title=GH_TOKEN not set::SECRET_OBTAINIUM_GH_PAT is required for per-app releases. Skipping."
            exit 0
          fi

          RELEASE_COUNT=0
          for apk in apks/*-output.apk; do
            [ -f "$apk" ] || continue

            APK_NAME="$(basename "$apk")"

            # Extract bare app_name from filename: Re{app_name}-Version...
            # Example: "Reyoutube-Version19.16.39-...-output.apk" → "youtube"
            APP_NAME="$(echo "$APK_NAME" | sed -n 's/^Re\([^-]*\)-.*/\1/p' | tr '[:upper:]' '[:lower:]')"
            if [ -z "$APP_NAME" ]; then
              echo "::warning title=Could not extract app name::Skipping $APK_NAME"
              continue
            fi

            # Skip apps that don't have a per-app changelog (e.g., extra files like MicroG)
            if [ ! -f "app_changelogs/${APP_NAME}.md" ]; then
              echo "  Skipping $APP_NAME — no per-app changelog (extra file, not a patched app)"
              continue
            fi

            echo "::group::Releasing $APP_NAME ($APK_NAME)"

            # Delete existing release + tag (force-update pattern)
            gh release delete "$APP_NAME" --repo "$TARGET_REPO" --yes --cleanup-tag 2>/dev/null || true

            # Create release with APK asset and per-app changelog
            NOTES_ARGS=(--notes-file "app_changelogs/${APP_NAME}.md")

            # Create release with APK asset
            if gh release create "$APP_NAME" "$apk" \
                --repo "$TARGET_REPO" \
                --title "$APP_NAME" \
                "${NOTES_ARGS[@]}" \
                --latest=false 2>&1; then
              echo "  ✅ Released $APP_NAME"
              RELEASE_COUNT=$((RELEASE_COUNT + 1))
            else
              echo "::warning title=Release failed::$APP_NAME release creation failed, continuing."
            fi

            echo "::endgroup::"
          done

          echo "Created $RELEASE_COUNT per-app release(s) in $TARGET_REPO"

      - name: Push Obtainium Export to Private Repo
        if: ${{ inputs.COMMIT_CHANGELOG && !inputs.CI_TEST}}
        env:
          PAT: ${{ secrets.SECRET_GITHUB_PAT }}
        run: |
          # Read target repo from the .env file injected earlier in the workflow.
          TARGET_REPO="$(grep -m1 '^OBTAINIUM_GH_PRIVATE_EXPORT=' .env 2>/dev/null | cut -d= -f2- | sed "s/^['\"]//; s/['\"]$//")"

          if [ -z "$TARGET_REPO" ]; then
            echo "OBTAINIUM_GH_PRIVATE_EXPORT not set. Skipping private repo push."
            exit 0
          fi

          # Validate user/repo format.
          if ! echo "$TARGET_REPO" | grep -qE '^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$'; then
            echo "::warning title=Invalid repo format::OBTAINIUM_GH_PRIVATE_EXPORT should be in 'user/repo' format, got '$TARGET_REPO'"
            exit 0
          fi

          # Check obtainium sources were generated.
          if [ ! -d obtainium_sources ] || [ -z "$(ls -A obtainium_sources 2>/dev/null)" ]; then
            echo "No Obtainium sources found. Skipping private repo push."
            exit 0
          fi

          # Verify PAT is available.
          if [ -z "$PAT" ]; then
            echo "::warning title=PAT not set::SECRET_GITHUB_PAT is required to push to private repo. Skipping."
            exit 0
          fi

          # Check repo visibility and warn if not private.
          API_RESPONSE=$(curl -s -H "Authorization: token $PAT" "https://api.github.com/repos/$TARGET_REPO" 2>/dev/null)
          VISIBILITY=$(echo "$API_RESPONSE" | jq -r '.visibility // empty' 2>/dev/null)
          REPO_EXISTS=$(echo "$API_RESPONSE" | jq -r '.id // empty' 2>/dev/null)

          if [ -z "$REPO_EXISTS" ]; then
            echo "::warning title=Repo not found::Target repository $TARGET_REPO does not exist or PAT lacks access. Skipping."
            exit 0
          fi

          if [ "$VISIBILITY" != "private" ]; then
            echo "::warning title=Repo not private::Target repository $TARGET_REPO is $VISIBILITY. Consider making it private for security."
          fi

          # Clone (or init if empty), copy obtainium_sources/, commit, force-push to 'repo' branch.
          echo "Pushing Obtainium sources to $TARGET_REPO (branch: repo)..."
          GH_URL="https://x-access-token:${PAT}@github.com/${TARGET_REPO}.git"

          # Clone 'repo' branch directly so old HTMLs are preserved; fall back to fresh init on first run.
          if git clone --branch repo --single-branch --depth 1 "$GH_URL" /tmp/private-obtainium 2>/dev/null; then
            cd /tmp/private-obtainium || exit 1
          else
            mkdir -p /tmp/private-obtainium
            cd /tmp/private-obtainium || exit 1
            git init -b repo
            git remote add origin "$GH_URL"
          fi

          mkdir -p obtainium_sources
          cp "$GITHUB_WORKSPACE/obtainium_sources"/*.html obtainium_sources/
          if [ -d "$GITHUB_WORKSPACE/obtainium_sources/json" ]; then
            cp -r "$GITHUB_WORKSPACE/obtainium_sources/json" obtainium_sources/
          fi
          git add obtainium_sources
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit --allow-empty -m "chore: Update Obtainium sources"
          git push --force origin HEAD:repo
          echo "✅ Pushed Obtainium sources to $TARGET_REPO (branch: repo)"

      - name: Cleanup Obtainium Sources
        if: ${{ inputs.COMMIT_CHANGELOG && !inputs.CI_TEST}}
        run: |
          # Remove obtainium_sources/ when OBTAINIUM_EXPORT is not enabled, so they
          # don't get committed to the changelogs branch. This runs after the private
          # repo push (or after it was skipped), so the files have already been consumed.
          OBTAINIUM_EXPORT=$(grep -m1 '^OBTAINIUM_EXPORT=' .env 2>/dev/null | cut -d= -f2- | tr -d '"' | tr -d "'" | tr '[:upper:]' '[:lower:]')
          if [ "$OBTAINIUM_EXPORT" != "true" ] && [ -d obtainium_sources ]; then
            echo "OBTAINIUM_EXPORT is not enabled. Removing obtainium_sources/."
            rm -rf obtainium_sources
          fi

      - name: Commit Update file
        if: ${{ inputs.COMMIT_CHANGELOG && !inputs.CI_TEST}}
        uses: stefanzweifel/git-auto-commit-action@master
        with:
          branch: changelogs
          skip_checkout: true
          file_pattern: "changelog.md changelog.json updates.json obtainium_sources/*"
          commit_message: 🚀New Build
          push_options: "--force"
