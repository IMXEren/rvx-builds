name: Sync Secrets to Reusable Workflow

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch for the PR (leave empty for default branch)"
        required: false
        type: string

jobs:
  update-secrets-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Setup python
        uses: actions/setup-python@main
        with:
          python-version: "3.12"

      - name: Install uv with all available options
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.x"
          python-version: "3"
          activate-environment: "true"

      - name: Install Requirements
        run: |
          uv pip install -r scripts/requirements.txt

      - name: Run sync secrets script
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: python scripts/sync_secrets.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          commit-message: "chore(ci): sync `SECRET_*` variables to build-artifact.yml"
          branch: "chore/sync-secrets"
          title: "chore(ci): Sync `SECRET_*` variables to build-artifact.yml"
          body: |
            This is an automated PR to keep the `workflow_call` secrets block in `.github/workflows/build-artifact.yml` in sync with your repository's actual Action Secrets.

            **Changes:**
            - Adds newly detected secrets prefixed with `SECRET_`
            - Removes `SECRET_` variables that are no longer present in repository settings.
          base: ${{ inputs.target_branch || github.event.repository.default_branch || 'main' }}
